<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position practice</title>
</head>
<body style="
    height: 3000px; 
    padding-top: 60px;
    padding-left: 90px;
">

    <div class="dsda" style="
        background-color: black;
        color: white;
        position: fixed;
        top: 0px;
        left: 0px;
        right: 0px;
        height: 50px;
        z-index: 100;
    ">
        header
    </div>

    <!--Sidebar-->
    <div style="
        background-color: green;
        color: white;
        position: fixed;
        left: 0;
        bottom: 0;
        top: 50px;
        width: 72px;
    ">
        sidebar

        <!--this div below will not be placed on page anymore, this div will placed relative to the sidebar's div element-->
        <div style="
            position: absolute;
            background-color: red;
            color: white;
            right: 0;
            top: 0;
        
        ">
            X
        </div>
    </div>

    <!--Position Absolute and Relative-->
    <div style="
        position: absolute;
        background-color: red;
        color: white;
        right: 10px;
        top: 60px;
        
    ">
        absolute
    </div>

    <div class="cd" style="
        background-color: lightblue;
        height: 200px;
        width: 200px;

        position: static;
        
    ">
        div 1
    </div>

    <div class="dc" style="
        background-color: lightpink;
        height: 200px;
        width: 200px;
        position: relative;
    ">
        div 2

        <div style="
            position: absolute;
            background-color: rgb(0, 0, 0);
            color: white;
            right: 10px;
            bottom: 10px;
        
        ">
            5:00
        </div>
    </div>
</body>
</html>
