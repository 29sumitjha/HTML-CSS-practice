<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position practice</title>
</head>
<body style="
    height: 3000px; 
    padding-top: 60px;
    padding-left: 90px;
">

    <div class="dsda" style="
        background-color: black;
        color: white;
        position: fixed;
        top: 0px;
        left: 0px;
        right: 0px;
        height: 50px;
    ">
        header
    </div>

    <!--Sidebar-->
    <div style="
        background-color: green;
        color: white;
        position: fixed;
        left: 0;
        bottom: 0;
        top: 50px;
        width: 72px;
    ">
        sidebar
    </div>

    <div class="cd" style="
        background-color: lightblue;
        height: 200px;
        width: 200px;

        position: static;
        
    ">
        div 1
    </div>

    <div class="dc" style="
        background-color: lightpink;
        height: 200px;
        width: 200px;
    ">
        div 2
    </div>
</body>
</html>
