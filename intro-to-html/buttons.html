<style>
    .subscribe-button{
        background-color: rgb(200, 2, 2);
        color: white;
        border: none;
        /* height: 36px;
        width: 105px; */
        padding-top: 10px;
        padding-left: 10px;
        padding-bottom: 10px;
        padding-right: 10px;

        border-radius: 2px;
        cursor: pointer;
        
        margin-right: 8px;

        transition: opacity 0.15s;

        vertical-align: top;

        
    }
    /*hover*/
    .subscribe-button:hover{
        opacity: 0.8;
    }
    .subscribe-button:active{
        opacity: 0.5;
    }


    .join-button{
        background-color: white;
        color: rgb(41, 118, 211);
        border-color: rgb(41, 118, 211);
        border-style: solid;
        border-width: 1px;
        /* height: 36px;
        width: 105px; */
        padding-top: 9px;
        padding-left: 10px;
        padding-bottom: 9px;
        padding-right: 10px;

        border-radius: 2px;
        cursor: pointer;
        margin-right: 8px;
        transition: background-color 0.15s, color 0.15s;
        vertical-align: top;
    }

    .join-button:hover{
        background-color: rgb(41, 118, 211);
        color: white;
    }
    .join-button:active{
        opacity: 0.7;
    }

    .tweet-button{
        background-color: rgb(57, 159, 248);
        color: white;
        /* height: 36px;
        width: 74px; */
        padding-top: 10px;
        padding-left: 15px;
        padding-bottom: 10px;
        padding-right: 15px;
        border-radius: 18px; /*half of height */
        border: none;
        font-weight: bold;
        cursor: pointer;
        transition: box-shadow 0.15s;

        vertical-align: top;
    }
    .tweet-button:hover{
        box-shadow: 5px 5px 10px rgba(0,0,0, 0.15);
    }
</style>


<button class="subscribe-button">Subscribe my channel</button>
<button class="join-button">Join</button>
